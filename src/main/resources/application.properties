# ================================
# APPLICATION CONFIGURATION
# ================================

# Server Configuration
server.port=8080

# Application Name
spring.application.name=finance-backend

# ================================
# DATABASE CONFIGURATION (H2)
# ================================

# H2 Database - In-memory for development
# Easy to switch to PostgreSQL/MySQL for production
spring.datasource.url=jdbc:h2:mem:financedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console - Access at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ================================
# JWT CONFIGURATION
# ================================

# Secret key for JWT signing (In production, use environment variables!)
jwt.secret=YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong123456789
jwt.expiration=86400000

# ================================
# SWAGGER/OPENAPI CONFIGURATION
# ================================

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ================================
# LOGGING CONFIGURATION
# ================================

logging.level.org.springframework.security=DEBUG
logging.level.com.finance=DEBUG
